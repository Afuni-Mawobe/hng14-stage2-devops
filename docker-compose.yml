services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hng_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  api:
    build: 
      context: ./api
      target: production
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hng_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      target: production
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hng_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  hng_network:
    name: hng_internal_network